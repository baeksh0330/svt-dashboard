<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVT Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:       #0b0c10;
    --surface:  #13141a;
    --card:     #1a1c25;
    --border:   rgba(255,255,255,0.07);
    --accent:   #c8a96e;
    --accent2:  #6e9dc8;
    --text:     #e8e4da;
    --muted:    #7a7770;
    --danger:   #e8705a;
    --success:  #6ec88a;
    --font-display: 'DM Serif Display', serif;
    --font-body:    'DM Sans', sans-serif;
    --radius:   12px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px, 5vw, 48px);
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(11,12,16,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 0.02em;
    color: var(--accent);
  }

  .logo span { color: var(--text); font-size: 13px; font-family: var(--font-body); margin-left: 8px; opacity: 0.5; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--success);
    background: rgba(110,200,138,0.1);
    border: 1px solid rgba(110,200,138,0.2);
    border-radius: 20px;
    padding: 4px 10px;
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .last-updated { font-size: 12px; color: var(--muted); }

  /* ── 레이아웃 ── */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: clamp(20px, 4vw, 40px) clamp(16px, 5vw, 48px);
  }

  /* ── 필터 바 ── */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 28px;
    align-items: center;
  }

  .filter-label { font-size: 12px; color: var(--muted); margin-right: 4px; white-space: nowrap; }

  select, input[type="date"] {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-family: var(--font-body);
    font-size: 13px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, input[type="date"]:focus { border-color: var(--accent); }

  .btn {
    background: var(--accent);
    color: #0b0c10;
    border: none;
    border-radius: var(--radius-sm);
    padding: 8px 18px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn:hover { opacity: 0.85; }

  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-outline:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }

  /* ── 요약 카드 그리드 ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    animation: fadeUp 0.4s ease both;
  }

  .stat-card:nth-child(1){animation-delay:0.05s}
  .stat-card:nth-child(2){animation-delay:0.1s}
  .stat-card:nth-child(3){animation-delay:0.15s}
  .stat-card:nth-child(4){animation-delay:0.2s}
  .stat-card:nth-child(5){animation-delay:0.25s}

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-display); font-size: 26px; color: var(--text); line-height: 1; }
  .stat-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .stat-accent { color: var(--accent); }

  /* ── 차트 그리드 ── */
  .chart-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    animation: fadeUp 0.4s ease both;
  }

  .chart-card.col-8 { grid-column: span 8; }
  .chart-card.col-4 { grid-column: span 4; }
  .chart-card.col-6 { grid-column: span 6; }
  .chart-card.col-12{ grid-column: span 12; }

  @media (max-width: 900px) {
    .chart-card.col-8, .chart-card.col-4,
    .chart-card.col-6, .chart-card.col-12 { grid-column: span 12; }
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .chart-wrap { position: relative; }

  /* ── 영상 테이블 ── */
  .video-section { margin-bottom: 28px; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .section-title { font-family: var(--font-display); font-size: 18px; }

  .sort-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .sort-btn {
    font-size: 12px;
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.18s;
  }

  .sort-btn.active, .sort-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,169,110,0.08);
  }

  /* 영상 카드 그리드 */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }

  .video-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s, border-color 0.18s;
    animation: fadeUp 0.35s ease both;
  }

  .video-card:hover { transform: translateY(-3px); border-color: rgba(200,169,110,0.3); }

  .video-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: #222;
    display: block;
  }

  .video-info { padding: 12px; }

  .video-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .video-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .video-views { font-size: 12px; color: var(--muted); }

  .video-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(200,169,110,0.12);
    color: var(--accent);
    border: 1px solid rgba(200,169,110,0.2);
    white-space: nowrap;
  }

  /* 급상승 배지 */
  .spike-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(232,112,90,0.12);
    color: var(--danger);
    border: 1px solid rgba(232,112,90,0.25);
  }

  /* 페이지네이션 */
  .pagination {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .page-btn {
    width: 34px; height: 34px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }

  .page-btn.active { background: var(--accent); color: #0b0c10; border-color: var(--accent); }
  .page-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  /* 로딩 스켈레톤 */
  .skeleton {
    background: linear-gradient(90deg, var(--card) 25%, #22242f 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
  }

  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* 빈 상태 */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  /* 영상 상세 모달 */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 560px;
    max-height: 85vh;
    overflow-y: auto;
    animation: modalIn 0.22s ease;
  }

  @keyframes modalIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }

  .modal-header {
    padding: 20px 20px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .modal-title { font-family: var(--font-display); font-size: 16px; line-height: 1.4; }
  .modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; padding:0; line-height:1; flex-shrink:0; }
  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 16px 20px 24px; }

  .modal-thumb { width:100%; border-radius:var(--radius-sm); margin-bottom:14px; }

  .modal-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }

  .modal-stat { text-align: center; padding: 10px; background: var(--surface); border-radius: var(--radius-sm); }
  .modal-stat-val { font-family: var(--font-display); font-size: 16px; }
  .modal-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

  .modal-meta { font-size: 12px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 10px; }

  /* 반응형 */
  @media (max-width: 600px) {
    .filter-bar { gap: 8px; }
    select, input[type="date"] { font-size: 12px; padding: 7px 10px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div class="logo">SVT Analytics <span>SEVENTEEN YouTube</span></div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>Live</div>
    <div class="last-updated" id="last-updated">불러오는 중...</div>
  </div>
</header>

<main>

  <!-- ── 필터 바 ── -->
  <div class="filter-bar">
    <span class="filter-label">카테고리</span>
    <select id="filter-category">
      <option value="">전체</option>
    </select>
    <span class="filter-label">기간</span>
    <input type="date" id="filter-from" placeholder="시작일">
    <span style="color:var(--muted);font-size:13px">~</span>
    <input type="date" id="filter-to" placeholder="종료일">
    <button class="btn" onclick="applyFilter()">적용</button>
    <button class="btn btn-outline" onclick="resetFilter()">초기화</button>
  </div>

  <!-- ── 요약 카드 ── -->
  <div class="stat-grid" id="stat-grid">
    <div class="stat-card"><div class="stat-label">총 영상</div><div class="stat-value skeleton" style="height:28px;width:80px">&nbsp;</div></div>
    <div class="stat-card"><div class="stat-label">총 조회수</div><div class="stat-value skeleton" style="height:28px;width:80px">&nbsp;</div></div>
    <div class="stat-card"><div class="stat-label">평균 조회수</div><div class="stat-value skeleton" style="height:28px;width:80px">&nbsp;</div></div>
    <div class="stat-card"><div class="stat-label">평균 좋아요율</div><div class="stat-value skeleton" style="height:28px;width:80px">&nbsp;</div></div>
    <div class="stat-card"><div class="stat-label">구독자</div><div class="stat-value skeleton" style="height:28px;width:80px">&nbsp;</div></div>
  </div>

  <!-- ── 차트 섹션 ── -->
  <div class="chart-grid">
    <div class="chart-card col-8" style="animation-delay:0.1s">
      <div class="card-title">월별 조회수 추이</div>
      <div class="chart-wrap" style="height:220px"><canvas id="chart-monthly"></canvas></div>
    </div>
    <div class="chart-card col-4" style="animation-delay:0.15s">
      <div class="card-title">카테고리별 비율</div>
      <div class="chart-wrap" style="height:220px"><canvas id="chart-donut"></canvas></div>
    </div>
    <div class="chart-card col-12" style="animation-delay:0.2s">
      <div class="card-title">카테고리별 평균 조회수</div>
      <div class="chart-wrap" style="height:180px"><canvas id="chart-category"></canvas></div>
    </div>
  </div>

  <!-- ── 급상승 배너 ── -->
  <div id="trending-section" style="margin-bottom:28px;display:none">
    <div class="section-header">
      <div class="section-title" style="font-size:15px;color:var(--danger)">&#9650; 급상승 영상</div>
    </div>
    <div id="trending-list" style="display:flex;gap:10px;flex-wrap:wrap"></div>
  </div>

  <!-- ── 영상 목록 ── -->
  <div class="video-section">
    <div class="section-header">
      <div class="section-title">영상 목록</div>
      <div class="sort-row">
        <button class="sort-btn active" onclick="setSort('view_count',this)">조회수</button>
        <button class="sort-btn" onclick="setSort('like_count',this)">좋아요</button>
        <button class="sort-btn" onclick="setSort('published_date',this)">최신순</button>
        <button class="sort-btn" onclick="setSort('comment_count',this)">댓글</button>
      </div>
    </div>
    <div class="video-grid" id="video-grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>

</main>

<!-- ── 모달 ── -->
<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ── 설정 ──────────────────────────────────────────
const API = "http://localhost:8000";
const CHART_COLORS = {
  "MV":       "#c8a96e",
  "퍼포먼스": "#6e9dc8",
  "고잉세븐틴":"#6ec88a",
  "비하인드": "#c86e9d",
  "티저":     "#e8705a",
  "라이브":   "#9d6ec8",
  "인터뷰":   "#c8c46e",
  "커버":     "#6ec8c4",
  "기타":     "#5a5a6a",
};

let state = {
  category: "",
  dateFrom: "",
  dateTo:   "",
  sortBy:   "view_count",
  page:     0,
  limit:    24,
};

let charts = {};

// ── 숫자 포맷 ─────────────────────────────────────
function fmt(n) {
  if (!n) return "0";
  if (n >= 1e8) return (n/1e8).toFixed(1) + "억";
  if (n >= 1e4) return (n/1e4).toFixed(1) + "만";
  return n.toLocaleString();
}

function fmtPct(n) { return n ? n.toFixed(2) + "%" : "0%"; }

// ── API 호출 ──────────────────────────────────────
async function api(path) {
  try {
    const res = await fetch(API + path);
    if (!res.ok) throw new Error(res.status);
    return await res.json();
  } catch(e) {
    console.error("[API 오류]", path, e);
    return null;
  }
}

// ── 초기 로드 ─────────────────────────────────────
async function init() {
  await Promise.all([loadSummary(), loadCategories(), loadCharts(), loadTrending()]);
  await loadVideos();
}

// ── 요약 통계 ─────────────────────────────────────
async function loadSummary() {
  const d = await api("/stats/summary");
  if (!d) return;
  document.getElementById("stat-grid").innerHTML = `
    <div class="stat-card">
      <div class="stat-label">총 영상</div>
      <div class="stat-value stat-accent">${fmt(d.total_videos)}</div>
      <div class="stat-sub">최근 ${d.latest_video_date || "-"}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">총 조회수</div>
      <div class="stat-value">${fmt(d.total_views)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">평균 조회수</div>
      <div class="stat-value">${fmt(Math.round(d.avg_views))}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">평균 좋아요율</div>
      <div class="stat-value">${fmtPct(d.avg_like_rate)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">구독자</div>
      <div class="stat-value">${fmt(d.subscriber_count)}</div>
    </div>
  `;
  document.getElementById("last-updated").textContent =
    "업데이트: " + (d.collected_at ? d.collected_at.slice(0,16).replace("T"," ") : "-");
}

// ── 카테고리 드롭다운 ─────────────────────────────
async function loadCategories() {
  const d = await api("/videos/categories");
  if (!d) return;
  const sel = document.getElementById("filter-category");
  d.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.video_type;
    opt.textContent = `${c.video_type} (${c.count})`;
    sel.appendChild(opt);
  });
}

// ── 차트 ──────────────────────────────────────────
async function loadCharts() {
  const [monthly, catStats] = await Promise.all([
    api("/stats/monthly" + (state.category ? `?category=${state.category}` : "")),
    api("/stats/by-category" +
      (state.dateFrom || state.dateTo
        ? `?date_from=${state.dateFrom}&date_to=${state.dateTo}` : "")),
  ]);

  const chartDefaults = {
    color: "#e8e4da",
    font: { family: "'DM Sans', sans-serif", size: 11 },
  };
  Chart.defaults.color = chartDefaults.color;
  Chart.defaults.font  = chartDefaults.font;

  // 월별 라인차트
  if (monthly && monthly.length) {
    if (charts.monthly) charts.monthly.destroy();
    charts.monthly = new Chart(document.getElementById("chart-monthly"), {
      type: "bar",
      data: {
        labels: monthly.map(m => m.year_month),
        datasets: [{
          label: "총 조회수",
          data: monthly.map(m => m.total_views),
          backgroundColor: "rgba(200,169,110,0.25)",
          borderColor: "#c8a96e",
          borderWidth: 1.5,
          borderRadius: 4,
          yAxisID: "y",
        },{
          label: "업로드 수",
          data: monthly.map(m => m.upload_count),
          type: "line",
          borderColor: "#6e9dc8",
          backgroundColor: "transparent",
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: "#6e9dc8",
          tension: 0.3,
          yAxisID: "y2",
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: "top", labels: { boxWidth: 12 } } },
        scales: {
          x: { grid: { color: "rgba(255,255,255,0.04)" }, ticks: { maxTicksLimit: 12 } },
          y: { grid: { color: "rgba(255,255,255,0.04)" }, position: "left" },
          y2: { grid: { display: false }, position: "right" },
        }
      }
    });
  }

  // 도넛차트
  if (catStats && catStats.length) {
    if (charts.donut) charts.donut.destroy();
    charts.donut = new Chart(document.getElementById("chart-donut"), {
      type: "doughnut",
      data: {
        labels: catStats.map(c => c.video_type),
        datasets: [{
          data: catStats.map(c => c.count),
          backgroundColor: catStats.map(c => CHART_COLORS[c.video_type] || "#5a5a6a"),
          borderWidth: 0,
          hoverOffset: 6,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: "65%",
        plugins: { legend: { position: "right", labels: { boxWidth: 10, padding: 8, font:{size:11} } } }
      }
    });

    // 카테고리별 평균 조회수
    if (charts.category) charts.category.destroy();
    const sorted = [...catStats].sort((a,b) => b.avg_views - a.avg_views);
    charts.category = new Chart(document.getElementById("chart-category"), {
      type: "bar",
      data: {
        labels: sorted.map(c => c.video_type),
        datasets: [{
          data: sorted.map(c => Math.round(c.avg_views)),
          backgroundColor: sorted.map(c => CHART_COLORS[c.video_type] || "#5a5a6a"),
          borderRadius: 4,
          borderWidth: 0,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, indexAxis: "y",
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: "rgba(255,255,255,0.04)" } },
          y: { grid: { display: false } }
        }
      }
    });
  }
}

// ── 급상승 ─────────────────────────────────────────
async function loadTrending() {
  const d = await api("/stats/trending?top_n=10&spike_threshold=200");
  if (!d || !d.length) return;
  const spikes = d.filter(v => v.is_spike);
  if (!spikes.length) return;

  document.getElementById("trending-section").style.display = "block";
  document.getElementById("trending-list").innerHTML = spikes.map(v => `
    <div class="stat-card" style="flex:0 0 auto;max-width:200px;cursor:pointer" onclick="openModal('${v.video_id}')">
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
        <span class="spike-badge">+${Math.round(v.growth_rate)}%</span>
        <span class="video-badge">${v.video_type}</span>
      </div>
      <div style="font-size:12px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${v.title}</div>
    </div>
  `).join("");
}

// ── 영상 목록 ─────────────────────────────────────
async function loadVideos() {
  const grid = document.getElementById("video-grid");
  grid.innerHTML = Array(8).fill(`
    <div class="video-card">
      <div class="skeleton" style="aspect-ratio:16/9"></div>
      <div class="video-info">
        <div class="skeleton" style="height:14px;margin-bottom:6px"></div>
        <div class="skeleton" style="height:12px;width:60%"></div>
      </div>
    </div>
  `).join("");

  let url = `/videos/?sort_by=${state.sortBy}&order=desc&limit=${state.limit}&offset=${state.page * state.limit}`;
  if (state.category) url += `&category=${state.category}`;
  if (state.dateFrom)  url += `&date_from=${state.dateFrom}`;
  if (state.dateTo)    url += `&date_to=${state.dateTo}`;

  const d = await api(url);
  if (!d) { grid.innerHTML = '<div class="empty">데이터를 불러올 수 없습니다.<br>FastAPI 서버가 실행 중인지 확인해주세요.</div>'; return; }

  if (!d.data.length) {
    grid.innerHTML = '<div class="empty">해당 조건에 맞는 영상이 없습니다.</div>';
    renderPagination(0);
    return;
  }

  grid.innerHTML = d.data.map((v, i) => `
    <div class="video-card" style="animation-delay:${i*0.03}s" onclick="openModal('${v.video_id}')">
      ${v.thumbnail
        ? `<img class="video-thumb" src="${v.thumbnail}" alt="${v.title}" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="video-thumb" style="background:#1e2030;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px">썸네일 없음</div>`}
      <div class="video-info">
        <div class="video-title">${v.title}</div>
        <div class="video-meta">
          <span class="video-views">${fmt(v.view_count)} 회</span>
          <span class="video-badge">${v.video_type}</span>
        </div>
      </div>
    </div>
  `).join("");

  renderPagination(d.total);
}

// ── 페이지네이션 ──────────────────────────────────
function renderPagination(total) {
  const totalPages = Math.ceil(total / state.limit);
  const pg = document.getElementById("pagination");
  if (totalPages <= 1) { pg.innerHTML = ""; return; }

  let html = "";
  for (let i = 0; i < Math.min(totalPages, 10); i++) {
    html += `<button class="page-btn ${i === state.page ? 'active' : ''}" onclick="goPage(${i})">${i+1}</button>`;
  }
  pg.innerHTML = html;
}

function goPage(n) { state.page = n; loadVideos(); window.scrollTo({top:0,behavior:"smooth"}); }

// ── 필터/정렬 ─────────────────────────────────────
function applyFilter() {
  state.category = document.getElementById("filter-category").value;
  state.dateFrom  = document.getElementById("filter-from").value;
  state.dateTo    = document.getElementById("filter-to").value;
  state.page = 0;
  loadVideos();
  loadCharts();
}

function resetFilter() {
  state.category = "";
  state.dateFrom = "";
  state.dateTo   = "";
  state.page     = 0;
  document.getElementById("filter-category").value = "";
  document.getElementById("filter-from").value = "";
  document.getElementById("filter-to").value   = "";
  loadVideos();
  loadCharts();
}

function setSort(col, btn) {
  state.sortBy = col;
  state.page   = 0;
  document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  loadVideos();
}

// ── 영상 모달 ─────────────────────────────────────
async function openModal(videoId) {
  const modal = document.getElementById("modal");
  modal.classList.add("open");
  document.getElementById("modal-title").textContent = "불러오는 중...";
  document.getElementById("modal-body").innerHTML = '<div class="skeleton" style="height:160px;border-radius:8px;margin-bottom:14px"></div>';

  const d = await api(`/videos/${videoId}`);
  if (!d) {
    document.getElementById("modal-body").innerHTML = '<div class="empty">상세 정보를 불러올 수 없습니다.</div>';
    return;
  }

  document.getElementById("modal-title").textContent = d.title;
  const likeRate = d.view_count ? ((d.like_count / d.view_count) * 100).toFixed(2) : "0";

  document.getElementById("modal-body").innerHTML = `
    ${d.thumbnail ? `<img class="modal-thumb" src="${d.thumbnail}" alt="${d.title}">` : ""}
    <div class="modal-stats">
      <div class="modal-stat"><div class="modal-stat-val">${fmt(d.view_count)}</div><div class="modal-stat-lbl">조회수</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${fmt(d.like_count)}</div><div class="modal-stat-lbl">좋아요</div></div>
      <div class="modal-stat"><div class="modal-stat-val">${likeRate}%</div><div class="modal-stat-lbl">좋아요율</div></div>
    </div>
    <div class="modal-meta">
      <span>&#128197; ${d.published_date}</span>
      <span>&#127916; ${d.video_type}</span>
      <span>&#9201; ${d.duration ? d.duration.toFixed(1) + "분" : "-"}</span>
      <span>&#128172; ${fmt(d.comment_count)}</span>
    </div>
    ${d.view_history && d.view_history.length
      ? `<div style="margin-top:12px;font-size:12px;color:var(--muted)">조회수 히스토리 ${d.view_history.length}개 기록됨</div>`
      : ""}
    <div style="margin-top:16px">
      <a href="https://youtube.com/watch?v=${d.video_id}" target="_blank"
         style="color:var(--accent);font-size:13px;text-decoration:none;border-bottom:1px solid rgba(200,169,110,0.3)">
        YouTube에서 보기 &#8599;
      </a>
    </div>
  `;
}

function closeModal(e) {
  if (e.target === document.getElementById("modal")) {
    document.getElementById("modal").classList.remove("open");
  }
}

// ── 실행 ──────────────────────────────────────────
init();
</script>
</body>
</html>
