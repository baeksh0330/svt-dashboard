# .github/workflows/collect.yml
# =============================================
# 세븐틴 YouTube 데이터 자동 수집 스케줄러
# - 매 6시간마다 실행 (00:00, 06:00, 12:00, 18:00 UTC)
# - 수집 결과를 CSV로 저장 후 자동 커밋
# =============================================

name: YouTube Data Collector

on:
  schedule:
    - cron: "0 */6 * * *"   # 6시간마다 (UTC 기준)
  workflow_dispatch:          # GitHub UI에서 수동 실행 버튼도 생김

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15       # 최대 15분 (API 오류 시 무한 대기 방지)

    steps:
      # 1. 저장소 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 환경 세팅
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"           # pip 캐시로 설치 시간 단축

      # 3. 의존성 설치
      - name: Install dependencies
        run: |
          pip install google-api-python-client pandas

      # 4. 데이터 수집 실행
      - name: Run collector
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          cd backend
          python collector.py

      # 5. DB 업데이트 (CSV → SQLite)
      - name: Update database
        run: |
          cd backend
          python database.py

      # 6. 변경된 CSV를 자동 커밋
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/seventeen_youtube.csv
          git add backend/seventeen_youtube_meta.json
          git add backend/svt.db
          # 변경사항 있을 때만 커밋 (없으면 스킵)
          git diff --staged --quiet || git commit -m "chore: auto-collect $(date +'%Y-%m-%d %H:%M') UTC"
          git push
